<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaChat Private Chat</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#5b4bff,#00c6ff);
height:100vh;
display:flex;
flex-direction:column;
color:white;
}

.header{
padding:15px;
background:rgba(0,0,0,.2);
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
max-width:70%;
padding:12px;
margin:10px 0;
border-radius:15px;
}

.left{
background:rgba(255,255,255,.2);
text-align:left;
}

.right{
background:white;
color:#5b4bff;
margin-left:auto;
}

.input-area{
display:flex;
padding:10px;
background:rgba(0,0,0,.2);
}

.input-area input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
outline:none;
}

.input-area button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:20px;
background:white;
color:#5b4bff;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<div class="avatar">👤</div>
<div>VIP KING 🟢</div>
</div>

<div class="chat-box">

<div class="msg left">
Hello 👋
</div>

<div class="msg right">
Hi, welcome to InstaChat 🎤
</div>

<div class="msg left">
How are you?
</div>

<div class="msg right">
I'm good 😎
</div>

</div>

<div class="input-area">
<input type="text" placeholder="Type a message...">
<button>Send</button>
</div>

</body>
</html>
