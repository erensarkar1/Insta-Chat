<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaChat Voice Room</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#5b4bff,#00c6ff);
    color:white;
    text-align:center;
}

.header{
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

.owner{
    background:gold;
    color:black;
    padding:6px 12px;
    border-radius:20px;
    display:inline-block;
    margin:10px;
    font-weight:bold;
}

.controls{
    margin:20px;
}

select{
    padding:10px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

.room{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    padding:20px;
    max-width:500px;
    margin:auto;
}

.seat{
    background:rgba(255,255,255,0.15);
    border-radius:15px;
    padding:15px;
    backdrop-filter:blur(10px);
}

.host{
    background:rgba(255,215,0,0.3);
    margin:20px auto;
    width:120px;
    padding:15px;
    border-radius:20px;
}

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111827;
    display:flex;
    justify-content:space-around;
    padding:15px;
}
</style>
</head>
<body>

<div class="header">🎤 InstaChat Voice Room</div>

<div class="owner">👑 OWNER</div>

<div class="host">
    👑 Host Seat
</div>

<div class="controls">
    <select id="seatCount" onchange="generateSeats()">
        <option value="8">8 Seats</option>
        <option value="9">9 Seats</option>
        <option value="12">12 Seats</option>
        <option value="15">15 Seats</option>
        <option value="20">20 Seats</option>
    </select>
</div>

<div class="room" id="room"></div>

<div class="bottom">
    <div>🎁 Gift</div>
    <div>💬 Chat</div>
    <div>🎤 Mic</div>
    <div>🚪 Leave</div>
</div>

<script>
function generateSeats(){
    const count = document.getElementById("seatCount").value;
    const room = document.getElementById("room");

    room.innerHTML = "";

    for(let i=1;i<=count;i++){
        room.innerHTML += `
        <div class="seat">
            🎙️<br>
            Seat ${i}
        </div>`;
    }
}

generateSeats();
</script>

</body>
</html>
