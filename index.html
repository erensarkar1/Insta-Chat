
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaChat Gift Shop</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#5b4bff,#00c6ff);
color:white;
text-align:center;
}

.header{
padding:20px;
font-size:30px;
font-weight:bold;
}

.wallet{
background:rgba(255,255,255,.15);
margin:20px;
padding:20px;
border-radius:20px;
}

.coins{
font-size:35px;
font-weight:bold;
color:gold;
}

.shop{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.gift{
background:rgba(255,255,255,.15);
padding:20px;
border-radius:20px;
}

.gift h2{
margin:10px 0;
}

.btn{
background:white;
color:#5b4bff;
border:none;
padding:10px 15px;
border-radius:20px;
font-weight:bold;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:15px;
}
</style>
</head>

<body>

<div class="header">🎁 Gift Shop</div>

<div class="wallet">
<h3>💰 Coin Wallet</h3>
<div class="coins">1,500,000</div>
<p>Available Coins</p>
</div>

<div class="shop">

<div class="gift">
<h2>🌹 Rose</h2>
<p>100 Coins</p>
<button class="btn">Send Gift</button>
</div>

<div class="gift">
<h2>❤️ Heart</h2>
<p>500 Coins</p>
<button class="btn">Send Gift</button>
</div>

<div class="gift">
<h2>👑 Crown</h2>
<p>10,000 Coins</p>
<button class="btn">Send Gift</button>
</div>

<div class="gift">
<h2>🚗 Car</h2>
<p>100,000 Coins</p>
<button class="btn">Send Gift</button>
</div>

<div class="gift">
<h2>✈️ Jet</h2>
<p>500,000 Coins</p>
<button class="btn">Send Gift</button>
</div>

<div class="gift">
<h2>🏰 Castle</h2>
<p>1,500,000 Coins</p>
<button class="btn">Send Gift</button>
</div>

</div>

<div class="bottom">
<div>🏠 Home</div>
<div>🎤 Rooms</div>
<div>💬 Chat</div>
<div>👤 Profile</div>
</div>

</body>
</html>
