<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaChat Profile</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#5b4bff,#00c6ff);
color:white;
text-align:center;
}

.profile{
padding:30px 20px;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.2);
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
border:4px solid gold;
}

.name{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

.badge{
display:inline-block;
padding:8px 15px;
border-radius:20px;
margin:5px;
font-weight:bold;
}

.owner{
background:gold;
color:black;
}

.vip{
background:#ff4dff;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,.15);
padding:15px;
border-radius:15px;
width:130px;
}

.buttons{
margin-top:25px;
}

.btn{
display:inline-block;
padding:12px 20px;
margin:5px;
border-radius:25px;
background:white;
color:#5b4bff;
font-weight:bold;
text-decoration:none;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:15px;
}
</style>
</head>

<body>

<div class="profile">

<div class="avatar">👤</div>

<div class="name">EREN SARKAR</div>

<div>
<span class="badge owner">👑 OWNER</span>
<span class="badge vip">💎 VIP DIAMOND</span>
</div>

<div class="stats">

<div class="card">
<h3>1.5M</h3>
<p>Coins</p>
</div>

<div class="card">
<h3>5000</h3>
<p>Followers</p>
</div>

<div class="card">
<h3>250</h3>
<p>Gifts</p>
</div>

<div class="card">
<h3>99</h3>
<p>Level</p>
</div>

</div>

<div class="buttons">
<a href="#" class="btn">✏ Edit Profile</a>
<a href="#" class="btn">🎁 Gifts</a>
</div>

</div>

<div class="bottom">
<div>🏠 Home</div>
<div>🎤 Rooms</div>
<div>💬 Chat</div>
<div>👤 Profile</div>
</div>

</body>
</html>
